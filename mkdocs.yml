site_name: MASI Hybrid Forecasting
site_description: Documentation for the MASI hybrid forecasting dashboard
repo_url: https://github.com/jaafarelkouhen/masi-hybrid-forecasting
docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Project Overview: overview.md
  - Installation: install.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
      check_paths: true
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html
